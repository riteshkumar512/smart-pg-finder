<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add PG</title>

    <style>
        body {
            background: #f4f7fb;
            font-family: 'Segoe UI', sans-serif;
        }

        /* CONTAINER */
        .addpg-container {
            max-width: 500px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        /* TITLE */
        .addpg-container h2 {
            text-align: center;
            margin-bottom: 25px;
        }

        /* INPUT */
        .addpg-container input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 14px;
        }

        /* BUTTON */
        .add-btn {
            width: 100%;
            padding: 12px;
            border: none;
            background: linear-gradient(45deg, #0072ff, #00c6ff);
            color: white;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
        }

        /* UPLOAD BOX */
        .upload-box {
            border: 2px dashed #ccc;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-bottom: 15px;
            background: #fafafa;
        }

        .upload-box input {
            display: none;
        }

        .upload-label {
            cursor: pointer;
            color: #555;
        }

        /* IMAGE PREVIEW */
        #preview {
            margin-top: 10px;
            max-width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
            display: none;
        }
    </style>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body>

<!-- ✅ NAVBAR -->
<div th:replace="~{fragments/navbar :: navbar}"></div>


<div class="addpg-container">

    <h2>➕ Add New PG</h2>


    <form action="/add-pg" method="post" enctype="multipart/form-data">

        <input type="text" name="name" placeholder="PG Name" required>

        <input type="text" name="city" placeholder="City" required>

        <input type="text" name="location" placeholder="Location" required>


        <input type="number" name="price" placeholder="Monthly Rent ₹" required>


        <div class="upload-box">
            <label for="imageUpload" class="upload-label">
                📸 Click to upload PG Image
            </label>
            <input type="file" id="imageUpload" name="image" accept="image/*">

            <img id="preview" src="#" alt="Preview">
        </div>

        <button type="submit" class="add-btn">Add PG 🚀</button>

    </form>

</div>

<script>
    document.getElementById("imageUpload").onchange = function (e) {
        const file = e.target.files[0];
        if (file) {
            const preview = document.getElementById("preview");
            preview.src = URL.createObjectURL(file);
            preview.style.display = "block";
        }
    };
</script>

</body>
</html>
