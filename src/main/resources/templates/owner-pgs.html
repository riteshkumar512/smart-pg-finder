<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My PGs</title>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #eef2f7;
        }

        .container {
            width: 90%;
            margin: 30px auto;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 320px));
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .card-body {
            padding: 15px;
        }

        .price {
            color: green;
            font-weight: bold;
        }

        .btn {
            display: inline-block;
            padding: 8px 12px;
            margin-top: 10px;
            border-radius: 6px;
            text-decoration: none;
            color: white;
            font-size: 14px;
        }

        .edit {
            background: #0072ff;
        }

        .delete {
            background: red;
        }
    </style>
    <link rel="stylesheet" th:href="@{/style.css}">

</head>

<body>

<!-- NAVBAR -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container">

    <h2>🏠 My PGs</h2>

    <div class="grid">

        <!-- LOOP -->
        <div th:each="pg : ${pgList}" class="card">

            <!-- IMAGE -->
            <img th:if="${pg.image != null}"
                 th:src="@{${pg.image}}">

            <!-- BODY -->
            <div class="card-body">

                <h3 th:text="${pg.name}"></h3>

                <p>📍 <span th:text="${pg.location}"></span></p>

                <p>🏙 <span th:text="${pg.city}"></span></p>

                <p class="price">₹ <span th:text="${pg.price}"></span></p>

                <!-- BUTTONS -->
                <a th:href="@{'/edit-pg/' + ${pg.id}}" class="btn edit">Edit</a>

                <a th:href="@{'/delete-pg/' + ${pg.id}}"
                   class="btn delete"
                   onclick="return confirm('Delete this PG?')">
                    Delete
                </a>

            </div>

        </div>

    </div>

    <p th:if="${#lists.isEmpty(pgList)}">No PG added yet</p>

</div>

</body>
</html>
