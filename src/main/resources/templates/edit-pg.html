<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit PG</title>

    <style>
        body {
            background: #f4f7fb;
            font-family: 'Segoe UI', sans-serif;
        }

        /* CONTAINER */
        .edit-container {
            max-width: 500px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        /* TITLE */
        .edit-container h2 {
            text-align: center;
            margin-bottom: 25px;
        }

        /* INPUT */
        .edit-container input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 14px;
            transition: 0.3s;
        }

        .edit-container input:focus {
            border-color: #0072ff;
            outline: none;
            box-shadow: 0 0 5px rgba(0,114,255,0.2);
        }

        /* BUTTON */
        .update-btn {
            width: 100%;
            padding: 12px;
            border: none;
            background: linear-gradient(45deg, #28a745, #00c851);
            color: white;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .update-btn:hover {
            transform: scale(1.03);
        }

        /* IMAGE PREVIEW */
        .preview-img {
            width: 150px;
            border-radius: 10px;
            margin-bottom: 10px;
        }
    </style>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body>

<!-- ✅ NAVBAR -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="edit-container">

    <h2>✏️ Edit PG</h2>

    <form action="/edit-pg" method="post" enctype="multipart/form-data">

        <input type="hidden" name="id" th:value="${pg.id}">

        <input type="text" name="name" th:value="${pg.name}" placeholder="PG Name" required>

        <input type="text" name="city" th:value="${pg.city}" placeholder="City" required>

        <input type="text" name="location" th:value="${pg.location}" placeholder="Location" required>

        <input type="number" name="price" th:value="${pg.price}" placeholder="Monthly Rent ₹" required>

        <!-- 🔥 CURRENT IMAGE -->
        <p><b>Current Image:</b></p>
        <img th:if="${pg.image != null}"
             th:src="@{'/images/' + ${pg.image}}"
             class="preview-img">

        <!-- 🔥 NEW IMAGE -->
        <input type="file" name="image" accept="image/*">

        <!-- 🔥 PREVIEW -->
        <img id="preview" class="preview-img" style="display:none;">

        <button type="submit" class="update-btn">Update PG 🚀</button>

    </form>

</div>

<script>
    document.querySelector("input[name='image']").onchange = function(e){
        const file = e.target.files[0];
        if(file){
            const preview = document.getElementById("preview");
            preview.src = URL.createObjectURL(file);
            preview.style.display = "block";
        }
    };
</script>

</body>
</html>
